name: CI/CD
on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  # ── JOB 1: always runs ──────────────────────────────
  build-and-test:
    runs-on: ubuntu-latest
    env:
      DATABASE_URL: ${{ secrets.DATABASE_URL }}  # ← secret injected
    steps:
      - name: Checkout code
        uses: actions/checkout@v4          # ← copies repo to runner
      - name: Create .env for docker-compose
        # Create a .env file from repository secrets so docker-compose's env_file can read values.
        run: |
          cat > .env <<EOF
          DATABASE_URL=${{ secrets.DATABASE_URL }}
          EOF
      - name: Build containers
        run: docker compose build          # ← builds your Dockerfile
      - name: Start services
        run: docker compose up -d          # ← starts app + db
      - name: Wait for database
        run: sleep 15                      # ← gives Postgres time
      - name: Validate DATABASE_URL secret
        run: |
          # Assign secret to a shell variable so special characters won't break conditionals
          DATABASE_URL="${{ secrets.DATABASE_URL }}"

          # Basic checks to give clearer failure messages in CI
          if [ -z "$DATABASE_URL" ]; then
            echo "ERROR: DATABASE_URL secret is not set." >&2
            exit 1
          fi

          # Detect secrets saved as 'DATABASE_URL=...' (common mistake)
          case "$DATABASE_URL" in
            DATABASE_URL=*)
              echo "ERROR: DATABASE_URL secret looks like 'KEY=VALUE'. Set the secret to the bare URL (no 'DATABASE_URL=' prefix)." >&2
              exit 1
              ;;
          esac

          # Warn if scheme doesn't look like postgresql://
          case "$DATABASE_URL" in
            postgresql://*) ;;
            *) echo "WARNING: DATABASE_URL does not start with 'postgresql://'. Prisma expects a postgresql scheme. Please verify the secret." >&2 ;;
          esac

      - name: Run migrations
        run: docker compose exec -T -e DATABASE_URL="${{ secrets.DATABASE_URL }}" app npx prisma migrate deploy
      - name: Run tests
        run: docker compose exec -T app npm test  # ← fails if tests fail
      - name: Tear down
        if: always()                       # ← runs even if step failed
        run: docker compose down -v

  # ── JOB 2: only runs on main, only if Job 1 passed ──
  deploy:
    needs: build-and-test                  # ← blocked until Job 1 green
    if: github.ref == 'refs/heads/main'   # ← skipped on PRs
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to EC2
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_KEY }}
          script: |
            if [ ! -d ~/my-app ]; then
              git clone https://github.com/Don-Quixoteeee/DonorCC.git ~/my-app
            fi
            cd ~/my-app && git pull origin main
            docker compose down
            docker compose up --build -d
            docker compose exec app npx prisma migrate deploy

