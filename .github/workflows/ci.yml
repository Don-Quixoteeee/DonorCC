name: CI/CD

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  # ── JOB 1: Build, test, and run migrations ──────────────────────────────
  build-and-test:
    runs-on: ubuntu-latest
    env:
      DATABASE_URL: ${{ secrets.DATABASE_URL }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Create and sanitize .env for docker-compose
        env:
          DB_SECRET: ${{ secrets.DATABASE_URL }}
        run: |
          set -euo pipefail

          # Sanitize DATABASE_URL with Python (removes leading DATABASE_URL= if present)
          python - <<'PY' > /tmp/db_url.txt
import os
s = os.environ.get('DB_SECRET', '')
if s.startswith('DATABASE_URL='):
    s = s[len('DATABASE_URL='):]
print(s, end='')
PY

          DBURL=$(cat /tmp/db_url.txt)
          if [ -z "$DBURL" ]; then
            echo "ERROR: DATABASE_URL secret is empty after sanitization." >&2
            exit 1
          fi

          echo "DATABASE_URL=$DBURL" > .env

      - name: Build containers
        run: docker compose build

      - name: Start services
        run: docker compose up -d

      - name: Wait for database
        run: sleep 15

      - name: Run migrations
        run: docker compose exec -T app npx prisma migrate deploy

      - name: Run tests
        run: docker compose exec -T app npm test

      - name: Tear down
        if: always()
        run: docker compose down -v

  # ── JOB 2: Deploy to EC2 ───────────────────────────────────────────────
  deploy:
    needs: build-and-test
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to EC2
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_KEY }}
          script: |
            set -euo pipefail

            # Install Docker if missing
            if ! command -v docker >/dev/null 2>&1; then
              echo "Docker not found — installing..."
              sudo apt-get update
              sudo apt-get install -y ca-certificates curl gnupg lsb-release
              sudo mkdir -p /etc/apt/keyrings
              curl -fsSL https://download.docker.com/linux/ubuntu/gpg | sudo gpg --dearmor -o /etc/apt/keyrings/docker.gpg
              echo "deb [arch=$(dpkg --print-architecture) signed-by=/etc/apt/keyrings/docker.gpg] https://download.docker.com/linux/ubuntu $(lsb_release -cs) stable" | sudo tee /etc/apt/sources.list.d/docker.list > /dev/null
              sudo apt-get update
              sudo apt-get install -y docker-ce docker-ce-cli containerd.io docker-compose-plugin
              sudo systemctl enable --now docker
              echo "Docker installed. Adding user to docker group (may require logout/login)."
              sudo usermod -aG docker $USER || true
            else
              echo "Docker already installed."
            fi

            # Clone or update repo
            if [ ! -d ~/my-app ]; then
              git clone https://github.com/Don-Quixoteeee/DonorCC.git ~/my-app
            fi
            cd ~/my-app && git pull origin main

            # Create .env on EC2
            echo "DATABASE_URL=${{ secrets.DATABASE_URL }}" > .env

            # Deploy app with Docker Compose
            docker compose down || true
            docker compose up --build -d
            docker compose exec -T app npx prisma migrate deploy
