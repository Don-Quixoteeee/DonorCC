name: CI/CD
on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  # ── JOB 1: always runs ──────────────────────────────
  build-and-test:
    runs-on: ubuntu-latest
    env:
      DATABASE_URL: ${{ secrets.DATABASE_URL }}  # ← secret injected
    steps:
      - name: Checkout code
        uses: actions/checkout@v4          # ← copies repo to runner
      - name: Create and sanitize .env for docker-compose
        # Uses Python to safely sanitize the secret (strips a leading 'DATABASE_URL=' if present)
        env:
          DB_SECRET: ${{ secrets.DATABASE_URL }}
        run: |
          set -euo pipefail

          # Use Python to avoid shell parsing issues with special characters in secrets
          python - <<'PY' > /tmp/db_url.txt
          import os
          s = os.environ.get('DB_SECRET', '')
          if s.startswith('DATABASE_URL='):
              s = s[len('DATABASE_URL='):]
          print(s, end='')
          PY

          DBURL=$(cat /tmp/db_url.txt)
          if [ -z "$DBURL" ]; then
            echo "ERROR: DATABASE_URL secret is empty after sanitization." >&2
            exit 1
          fi

          cat > .env <<EOF
          DATABASE_URL=$DBURL
          EOF
      - name: Build containers
        run: docker compose build          # ← builds your Dockerfile
      - name: Start services
        run: docker compose up -d          # ← starts app + db
      - name: Wait for database
        run: sleep 15                      # ← gives Postgres time
  # ...sanitization is handled in the Create step above

      - name: Run migrations
        run: docker compose exec -T app npx prisma migrate deploy
      - name: Run tests
        run: docker compose exec -T app npm test  # ← fails if tests fail
      - name: Tear down
        if: always()                       # ← runs even if step failed
        run: docker compose down -v

  # ── JOB 2: only runs on main, only if Job 1 passed ──
  deploy:
    needs: build-and-test                  # ← blocked until Job 1 green
    if: github.ref == 'refs/heads/main'   # ← skipped on PRs
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to EC2
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_KEY }}
          script: |
            # Install Docker engine + compose plugin if missing (Ubuntu-friendly)
            if ! command -v docker >/dev/null 2>&1; then
              echo "Docker not found on remote host — installing..."
              sudo apt-get update
              sudo apt-get install -y ca-certificates curl gnupg lsb-release
              sudo mkdir -p /etc/apt/keyrings
              curl -fsSL https://download.docker.com/linux/ubuntu/gpg | sudo gpg --dearmor -o /etc/apt/keyrings/docker.gpg
              echo "deb [arch=$(dpkg --print-architecture) signed-by=/etc/apt/keyrings/docker.gpg] https://download.docker.com/linux/ubuntu $(lsb_release -cs) stable" | sudo tee /etc/apt/sources.list.d/docker.list > /dev/null
              sudo apt-get update
              sudo apt-get install -y docker-ce docker-ce-cli containerd.io docker-compose-plugin
              sudo systemctl enable --now docker
              echo "Docker installed. Adding user to docker group (may require logout/login)."
              sudo usermod -aG docker $USER || true
            else
              echo "Docker already installed on remote host."
            fi

            if [ ! -d ~/my-app ]; then
              git clone https://github.com/Don-Quixoteeee/DonorCC.git ~/my-app
            fi
            cd ~/my-app && git pull origin main

            echo "DATABASE_URL=${{ secrets.DATABASE_URL }}" > .env
            
            docker compose down
            docker compose up --build -d
            docker compose exec app npx prisma migrate deploy
            # Use sudo for docker commands in case the deploy user isn't in the docker group
            sudo docker compose down || true
            sudo docker compose up --build -d
            sudo docker compose exec app npx prisma migrate deploy
