name: CI/CD

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    env:
      DATABASE_URL: ${{ secrets.DATABASE_URL }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Create .env
        run: echo "DATABASE_URL=${{ secrets.DATABASE_URL }}" > .env

      - name: Build Docker containers
        run: docker compose build

      - name: Start services
        run: docker compose up -d

      - name: Wait for database
        run: |
          echo "Waiting for database to be ready..."
          for i in $(seq 1 15); do
            docker compose exec -T app npx prisma db pull && break || sleep 2
          done

      - name: Run Prisma migrations
        run: docker compose exec -T app npx prisma migrate deploy

      - name: Run tests
        run: docker compose exec -T app npm test

      - name: Tear down
        if: always()
        run: |
          if [ -f .env ]; then
            docker compose down -v
          else
            docker compose down -v || true
          fi

  deploy:
    needs: build-and-test
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to EC2
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_KEY }}
          script: |
            cd ~/my-app || git clone https://github.com/Don-Quixoteeee/DonorCC.git ~/my-app && cd ~/my-app
            git pull origin main
            echo "DATABASE_URL=${{ secrets.DATABASE_URL }}" > .env
            docker compose down -v || true
            docker compose up --build -d
            docker compose exec -T app npx prisma migrate deploy
