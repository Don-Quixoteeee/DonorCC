services:
  app:
    build: .
    restart: unless-stopped

    ports:
      - "80:3000"

    env_file:
      - .env

    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3000/ > /dev/null 2>&1 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 6
      start_period: 15s

    volumes:
      - uploads_data:/app/public/uploads

volumes:
  uploads_data:
